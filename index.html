<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exhibition Gallery Viewing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
                aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                aria-label="Slide 3"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3"
                aria-label="Slide 4"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="4"
                aria-label="Slide 5"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="5"
                aria-label="Slide 6"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="6"
                aria-label="Slide 7"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="7"
                aria-label="Slide 8"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="8"
                aria-label="Slide 9"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="9"
                aria-label="Slide 10"></button>
        </div>

        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="Images & Videos/Photo 1.jpg" class="d-100 w-100" alt="Entrance 1">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 2.jpg" class="d-100 w-100" alt="Entrance 2">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 3.jpg" class="d-100 w-100" alt="Entrance 3">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 4.jpg" class="d-100 w-100" alt="Entrance 4">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 5.jpg" class="d-100 w-100" alt="Middle Section 1">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 6.jpg" class="d-100 w-100" alt="Middle Section 2">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 7.jpg" class="d-100 w-100" alt="Inner Section 1">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 8.jpg" class="d-100 w-100" alt="Inner Section 2">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 9.jpg" class="d-100 w-100" alt="Inner Section 3">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 10.jpg" class="d-100 w-100" alt="Inner Section 4">
            </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
</body>

</html>
<!DOCTYPE html>
<html lang="en">
